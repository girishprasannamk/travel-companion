name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Allow this job to clone the repo and push to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        # PAGES_BASE_PATH mounts the app under /travel-companion on the
        # project site. Leave empty for Vercel/Firebase (same code deploys).
        run: npm run build
        env:
          PAGES_BASE_PATH: /travel-companion

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
